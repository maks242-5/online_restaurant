<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронювання столика | Tomato&Co</title>
    <style>
        /* Базові налаштування */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #f8f9fa; 
            color: #333; 
            line-height: 1.6;
        }

        /* Контейнер форми */
        .booking-container {
            max-width: 450px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-weight: 600;
        }

        /* Стилізація елементів форми */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }

        select, input[type="datetime-local"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fcfcfc;
            transition: all 0.3s ease;
            outline: none;
        }

        select:focus, input[type="datetime-local"]:focus {
            border-color: #ff4757; /* Фірмовий колір Tomato */
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.15);
        }

        /* Кнопка */
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(255, 71, 87, 0.2);
        }

        button[type="submit"]:hover {
            background-color: #e03d4b;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Розумні сповіщення про статус */
        .alert-message {
            margin-top: 20px;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
            font-weight: 500;
        }
        /* Якщо повідомлення містить "успішно", фарбуємо в зелений, інакше в червоний за допомогою Jinja2 */
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    {% include '_navigation.html' %}

    <div class="booking-container">
        <h2>Бронювання столика</h2>

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="table_type">Оберіть тип столика</label>
                <select name="table_type" id="table_type">
                    <option value="1-2">На 1-2 людини</option>
                    <option value="3-4">На 3-4 людини</option>
                    <option value="4+">Більше 4-х людей</option>
                </select>
            </div>

            <div class="form-group">
                <label for="time">Дата та час візиту</label>
                <input type="datetime-local" name="time" id="time" required>
            </div>

            <input type="hidden" name="latitude" id="latitude" value="48.2917">
            <input type="hidden" name="longitude" id="longitude" value="25.9352">

            <button type="submit">Забронювати стіл</button>
        </form>

        {# Красиве виведення повідомлень користувачу #}
        {% if message %}
            <div class="alert-message {% if 'успішно' in message %}alert-success{% else %}alert-danger{% endif %}">
                {{ message }}
            </div>
        {% endif %}
    </div>

    <script nonce="{{nonce}}">
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function (position) {
                        // Якщо користувач дозволив доступ, перезаписуємо точними координатами
                        document.getElementById("latitude").value = position.coords.latitude;
                        document.getElementById("longitude").value = position.coords.longitude;
                    },
                    function (error) {
                        console.warn("Доступ до геолокації відхилено. Використовуються базові координати Чернівців:", error);
                    }
                );
            } else {
                console.warn("Геолокація не підтримується у вашому браузері.");
            }
        };
    </script>
</body>
</html>
